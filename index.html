<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>🍀 Rifa da Sorte 💰</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: Arial; background: linear-gradient(135deg,#0f2027,#203a43,#2c5364); color:#fff; text-align:center; margin:0; overflow-x:hidden; }
header { background:#000; padding:15px; font-size:22px; position:sticky; top:0; }
.grid { display:grid; grid-template-columns:repeat(10,1fr); gap:8px; padding:15px; }
.bilhete { padding:12px; border-radius:6px; cursor:pointer; font-weight:bold; }
.disponivel { background:#2ecc71; }
.reservado { background:#f1c40f; color:#000; cursor:not-allowed; }
.pago { background:#e74c3c; cursor:not-allowed; }
.admin { display:none; background:#111; padding:10px; }
#resultado { font-size:50px; }
#timer { font-size:40px; }
</style>
</head>

<body>

<header>🍀 Rifa da Sorte v0.1 💰</header>

<div style="display:flex; justify-content:center; gap:30px; margin-top:20px;">
<div>
<h2>🎥 Sorteio</h2>
<div id="resultado">--</div>
</div>
<div id="timer">00:10</div>
</div>

<button onclick="sortear()">🎯 Sortear</button>
<button onclick="admin()">🔐 Admin</button>

<h2>Escolha seu número</h2>
<div class="grid" id="grid"></div>

<!-- 🔥 FIREBASE (NO LUGAR CERTO) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDnsa34KhQ3wOlt8QoBeSMCbjpnwC-d3w0",
  authDomain: "trevodasorte-23ef1.firebaseapp.com",
  projectId: "trevodasorte-23ef1",
  storageBucket: "trevodasorte-23ef1.firebasestorage.app",
  messagingSenderId: "516910223603",
  appId: "1:516910223603:web:cafb46c94ef9580bc7a786",
  measurementId: "G-L5WD101ZPV"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
</script>

<!-- 🔽 SEU SCRIPT -->
<script>
let adminAtivo = false;
let dados = {};
let resultado = "--";

const grid = document.getElementById("grid");
const rDiv = document.getElementById("resultado");

/* 🔥 CARREGAR DO FIREBASE */
async function carregarFirebase(){
  const doc = await db.collection("rifa").doc("dados").get();

  if(doc.exists){
    const data = doc.data();
    dados = data.bilhetes || {};
    resultado = data.resultado || "--";
    rDiv.innerText = resultado;
  }

  criar();
}

/* 🔥 SALVAR */
function salvar(){
  db.collection("rifa").doc("dados").set({
    bilhetes: dados,
    resultado: resultado
  });
}

/* SISTEMA */
function criar(){
  grid.innerHTML="";
  for(let i=0;i<100;i++){
    let num = i.toString().padStart(2,'0');
    let info = dados[num] || {status:"disponivel"};

    let div = document.createElement("div");
    div.className = "bilhete " + info.status;
    div.innerText = num;
    div.onclick = () => clicar(num);

    grid.appendChild(div);
  }
}

function clicar(num){
  if(!dados[num]) dados[num]={status:"reservado"};
  else dados[num]={status:"disponivel"};

  salvar();
  criar();
}

function admin(){
  let s = prompt("Senha:");
  if(s==="1234"){
    adminAtivo=true;
    alert("Admin ativado");
  }
}

function sortear(){
  let nums = Object.keys(dados);
  if(nums.length===0){ alert("Nada"); return; }

  let vencedor = nums[Math.floor(Math.random()*nums.length)];
  resultado = vencedor;
  rDiv.innerText = vencedor;

  salvar();
}

/* INICIAR */
carregarFirebase();
</script>

</body>
</html>
