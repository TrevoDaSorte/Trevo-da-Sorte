<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>🍀 Trevo da Sorte 🍀 </title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:#fff;
    text-align:center;
    margin:0;
}

header {
    background:#000;
    padding:15px;
    font-size:22px;
}

.grid {
    display:grid;
    grid-template-columns:repeat(10,1fr);
    gap:8px;
    padding:15px;
}

.bilhete {
    padding:12px;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}

.disponivel { background:#2ecc71; }
.reservado { background:#f1c40f; color:#000; }
.pago { background:#e74c3c; }

.admin {
    display:none;
    background:#111;
    padding:10px;
}

#resultado {
    font-size:50px;
    margin:20px;
}

.painel {
    background:#000;
    padding:10px;
    margin:10px;
}

button {
    padding:10px;
    margin:5px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}
</style>
</head>

<body>

<header>🍀 Rifa da Sorte ✨️💰</header>

<h2>🎥 Sorteio</h2>
<div id="resultado">--</div>

<button onclick="sortear()">🎯 Sortear</button>
<button onclick="admin()">🔐 Admin</button>

<div class="admin" id="painel">

    <div class="painel">
        <b>📊 Relatório</b><br>
        Disponíveis: <span id="disp">0</span><br>
        Reservados: <span id="res">0</span><br>
        Pagos: <span id="pag">0</span>
    </div>

    <div class="painel">
        <b>💳 PIX</b><br>
        <button onclick="copiarPix()">Copiar chave PIX</button>
    </div>

    <button onclick="resetar()">🗑 Resetar</button>
</div>

<h2>Escolha seu número</h2>
<div class="grid" id="grid"></div>

<script>
const numeroWhatsApp = "5598988256736"; // TROCAR
const chavePix = "7c81606a-e7cc-4bce-b0c3-6c03f3363eee"; // TROCAR

let adminAtivo = false;
let dados = JSON.parse(localStorage.getItem("bilhetes")) || {};
let resultado = localStorage.getItem("resultado") || "--";

const grid = document.getElementById("grid");
const rDiv = document.getElementById("resultado");

rDiv.innerText = resultado;

// CRIAR
function criar(){
    grid.innerHTML = "";

    let disp=0,res=0,pag=0;

    for(let i=0;i<100;i++){
        let num = i.toString().padStart(2,'0');
        let info = dados[num] || {status:"disponivel", nome:""};

        if(info.status==="disponivel") disp++;
        if(info.status==="reservado") res++;
        if(info.status==="pago") pag++;

        let div = document.createElement("div");
        div.className = "bilhete " + info.status;
        div.innerHTML = num + "<br><small>"+(info.nome||"")+"</small>";

        div.onclick = () => clicar(num);

        grid.appendChild(div);
    }

    document.getElementById("disp").innerText = disp;
    document.getElementById("res").innerText = res;
    document.getElementById("pag").innerText = pag;
}

// CLIQUE
function clicar(num){
    if(!adminAtivo){
        window.open(`https://wa.me/${numeroWhatsApp}?text=Quero o bilhete ${num}`);
        if(!dados[num]) dados[num]={status:"reservado", nome:""};
    } else {
        let nome = prompt("Nome:");

        if(!dados[num]) dados[num]={status:"disponivel", nome:""};

        if(dados[num].status==="disponivel") dados[num].status="reservado";
        else if(dados[num].status==="reservado") dados[num].status="pago";
        else dados[num]={status:"disponivel", nome:""};

        if(nome) dados[num].nome=nome;
    }

    salvar();
    criar();
}

// PIX
function copiarPix(){
    navigator.clipboard.writeText(chavePix);
    alert("PIX copiado!");
}

// SALVAR
function salvar(){
    localStorage.setItem("bilhetes", JSON.stringify(dados));
}

// ADMIN
function admin(){
    let s = prompt("Senha:");
    if(s==="1234"){
        adminAtivo=true;
        document.getElementById("painel").style.display="block";
    }
}

// RESET
function resetar(){
    if(confirm("Apagar tudo?")){
        localStorage.clear();
        dados={};
        resultado="--";
        rDiv.innerText="--";
        criar();
    }
}

// SORTEIO
function sortear(){
    if(!adminAtivo){
        alert("Apenas admin");
        return;
    }

    let pagos=[];

    for(let n in dados){
        if(dados[n].status==="pago") pagos.push(n);
    }

    if(pagos.length===0){
        alert("Nenhum pago");
        return;
    }

    let i=0;

    let anim=setInterval(()=>{
        rDiv.innerText=Math.floor(Math.random()*100).toString().padStart(2,'0');
        i++;

        if(i>20){
            clearInterval(anim);

            let vencedor = pagos[Math.floor(Math.random()*pagos.length)];
            rDiv.innerText="🏆 "+vencedor;

            localStorage.setItem("resultado", vencedor);
        }
    },100);
}

criar();
</script>

</body>
</html>
